<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NivaOps — Offline</title>
  <meta name="theme-color" content="#0F1117" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F7F5;
      color: #0F1117;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: #0F1117;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #64748B; line-height: 1.5; max-width: 280px; margin: 0 auto 28px; }
    button {
      background: #0F1117;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="icon">
    <svg width="40" height="40" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <image width="64" height="64" href="/favicon.png"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. NivaOps needs a connection to load your tenant data.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
